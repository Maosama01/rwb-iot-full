# ──────────────────────────────────────────────────────────────────────────────
# Rawbin Backend — Local Development Stack
#
# Services:
#   db        – PostgreSQL 16 + TimescaleDB extension
#   redis     – Redis 7 (cache / pubsub / Celery broker)
#   api       – FastAPI application (auto-reload)
#   worker    – Celery background worker
#   flower    – Celery monitoring UI (optional, comment out if unused)
# ──────────────────────────────────────────────────────────────────────────────

x-app-env: &app-env
  env_file:
    - .env

services:
  # ─── PostgreSQL 16 + TimescaleDB ───────────────────────────────────────────
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: rawbin_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rawbin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rawbin_dev_secret}
      POSTGRES_DB: ${POSTGRES_DB:-rawbin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Host 5432 is taken by a native Windows PostgreSQL, so publish on 5433.
      # The container still listens on 5432 internally (app/worker use db:5432).
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rawbin} -d ${POSTGRES_DB:-rawbin}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rawbin_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-rawbin_redis_dev}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-rawbin_redis_dev}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── FastAPI Application ────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: runtime
    container_name: rawbin_api
    restart: unless-stopped
    <<: *app-env
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-dir /app/app
        --log-level debug
    volumes:
      - ./:/app  # Mount source for hot-reload
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Celery Worker ──────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      target: runtime
    container_name: rawbin_worker
    restart: unless-stopped
    <<: *app-env
    command: >
      celery -A app.workers.celery_app worker
        --loglevel=info
        --concurrency=4
        --queues=default,telemetry
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── MQTT Ingestion Worker (standalone telemetry subscriber) ───────────────
  mqtt_worker:
    build:
      context: .
      target: runtime
    container_name: rawbin_mqtt_worker
    restart: unless-stopped
    <<: *app-env
    command: python -m app.workers.mqtt_listener
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_started

  # ─── Telemetry Simulator Worker ─────────────────────────────────────────────
  simulator:
    build:
      context: .
      target: runtime
    container_name: rawbin_simulator
    restart: unless-stopped
    <<: *app-env
    command: python -m scripts.telemetry_simulator
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_started

  # ─── Flower (Celery monitoring UI) ─────────────────────────────────────────
  flower:
    build:
      context: .
      target: runtime
    container_name: rawbin_flower
    restart: unless-stopped
    <<: *app-env
    command: >
      celery -A app.workers.celery_app flower
        --port=5555
        --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin}
    ports:
      - "5555:5555"
    depends_on:
      - worker

  # ─── Mosquitto MQTT Broker ─────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: rawbin_mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  # ─── React Frontend Application ─────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: rawbin_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api


volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  mosquitto_log:
