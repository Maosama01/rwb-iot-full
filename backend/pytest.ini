[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Ensure test DB URL is used, never production
env =
    POSTGRES_HOST=db
    POSTGRES_DB=rawbin_test
    APP_ENV=development
    DEBUG=true

# Markers
markers =
    integration: marks tests as integration tests (require Docker stack)
    unit: marks tests as pure unit tests (no I/O)
