# A generic, single database configuration.

[alembic]
# Path to migration scripts.
script_location = alembic

# Template used to generate migration file names.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path path(s) — needed so env.py can import app modules
prepend_sys_path = .

# Encoding of migration scripts.
output_encoding = utf-8

# Alembic will use this if you don't set SQLALCHEMY_URL in env.py.
# We override this in env.py by reading from app.core.config.
sqlalchemy.url = postgresql+psycopg2://rawbin:rawbin_dev_secret@db:5432/rawbin


[post_write_hooks]
# Optional: auto-format generated migration files
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
