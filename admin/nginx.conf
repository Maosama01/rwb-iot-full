server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unknown paths (e.g. /users, /alerts) serve index.html so
    # React Router can handle them client-side instead of returning 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
